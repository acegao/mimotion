name: 刷步数

on:
  schedule:
    # Beijing window starts: 08:30, 10:30, 12:30, 14:30, 16:30, 18:30, 20:30
    - cron: '30 0,2,4,6,8,10,12 * * *'
    # Beijing fallback checks: 09:45, 11:45, 13:45, 15:45, 17:45, 19:45, 21:45
    - cron: '45 1,3,5,7,9,11,13 * * *'
  workflow_dispatch:
    inputs:
      count_toward_daily:
        description: 是否计入今日执行次数
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: mimotion-daily-execution
  cancel-in-progress: false
  queue: max

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
          fetch-depth: 0
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 随机延迟
        if: github.event_name == 'schedule' && github.event.schedule == '30 0,2,4,6,8,10,12 * * *'
        run: |
          delay=$(python3 - <<'PY'
          import random
          print(random.randint(0, 3600))
          PY
          )
          echo "random delay seconds: ${delay}"
          echo "window start: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          sleep "${delay}"
          echo "execute time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          
      - name: 检查并补齐今日执行
        id: reconcile
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
          COUNT_TOWARD_DAILY: ${{ github.event_name != 'workflow_dispatch' || inputs.count_toward_daily }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 execution_reconciler.py

      - name: persist tokens
        if: always() && steps.reconcile.outputs.executed != '0'
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add encrypted_tokens.data runtime/execution_state.json
          git diff --cached --quiet && exit 0
          git commit -m "persist execution state trigger by ${{ github.event_name }}"
          for attempt in 1 2 3; do
            git fetch origin master
            if ! git rebase origin/master; then
              git rebase --abort
              exit 1
            fi
            if git push origin HEAD:master; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          exit 1
