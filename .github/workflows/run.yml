name: 刷步数

on:
  schedule:
    - cron: '30 8,9,11,13,15,17,19 * * *'
      timezone: "Asia/Shanghai"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 随机延迟
        if: github.event_name == 'schedule'
        run: |
          delay=$(python3 - <<'PY'
          import random
          print(random.randint(0, 3600))
          PY
          )
          echo "random delay seconds: ${delay}"
          echo "window start: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          sleep "${delay}"
          echo "execute time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master
